# yaml-language-server: $schema=https://raw.githubusercontent.com/databricks/cli/main/bundle/schema/jsonschema.json
bundle:
  name: pokeapi-lakehouse
  databricks_cli_version: ">= 1.8.0"

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog que armazenará os schemas do projeto.
    default: workspace
  bronze_schema:
    description: Schema da camada Bronze.
    default: pokeapi_bronze_dev
  silver_schema:
    description: Schema da camada Silver.
    default: pokeapi_silver_dev
  gold_schema:
    description: Schema da camada Gold.
    default: pokeapi_gold_dev

workspace:
  host: https://dbc-147a7d81-86aa.cloud.databricks.com

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

